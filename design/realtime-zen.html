                "on-primary-fixed-variant": "#004493",
                "inverse-surface": "#2f3034",
                "on-secondary": "#ffffff",
                "secondary-fixed": "#ffdad5",
                "on-primary-fixed": "#001a41",
                "on-primary": "#ffffff",
                "surface-bright": "#faf9fe",
                "error-container": "#ffdad6",
                "error": "#ba1a1a",
                "surface-container": "#eeedf3",
                "on-surface-variant": "#414755",
                "primary-fixed": "#d8e2ff",
                "tertiary-fixed": "#e2dfff",
                "primary-container": "#0070eb",
                "on-tertiary-container": "#fffbff",
                "primary": "#0058bc",
                "on-secondary-fixed": "#410001",
                "surface-tint": "#005bc1",
                "on-tertiary-fixed": "#0c006a",
                "inverse-primary": "#adc6ff",
                "tertiary": "#4c4aca",
                "on-tertiary-fixed-variant": "#3631b4",
                "surface-container-highest": "#e3e2e7",
                "primary-fixed-dim": "#adc6ff",
                "on-primary-container": "#fefcff",
                "tertiary-fixed-dim": "#c2c1ff",
                "on-error-container": "#93000a",
                "secondary": "#bc000a",
                "surface-container-high": "#e9e7ed",
                "surface-dim": "#dad9df",
                "surface-variant": "#e3e2e7",
                "secondary-fixed-dim": "#ffb4aa",
                "on-surface": "#1a1b1f",
                "outline-variant": "#c1c6d7",
                "outline": "#717786"

            "borderRadius": {
                "DEFAULT": "0.25rem",

                "xl": "0.75rem",

            "spacing": {

                "xs": "4px",

                "sm": "12px",

                "content-max-width": "800px",

            "fontFamily": {

<style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #ffffff;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .fade-in-up {
            animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .waveform-bar {
            transition: height 0.15s ease-in-out;
        }
        .text-focus-in {
            animation: text-focus-in 0.8s cubic-bezier(0.550, 0.085, 0.680, 0.530) both;
        }
        @keyframes text-focus-in {
            0% { filter: blur(12px); opacity: 0; }
            100% { filter: blur(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-white text-on-surface selection:bg-black selection:text-white">
<!-- Zen Canvas -->
<main class="relative h-screen w-screen flex flex-col items-center justify-center p-xl">
<!-- Status Labels: Top Corners -->
<div class="fixed top-lg left-lg flex items-center gap-md opacity-40">
<span class="font-label-caps text-label-caps uppercase tracking-widest">Session ID: EC-0812</span>
<span class="w-1 h-1 bg-black rounded-full"></span>
<span class="font-label-caps text-label-caps uppercase tracking-widest" id="timer">00:04:12</span>
</div>
<div class="fixed top-lg right-lg flex items-center gap-md opacity-40">
<span class="font-label-caps text-label-caps uppercase tracking-widest flex items-center gap-xs">
<span class="material-symbols-outlined text-[14px]" data-icon="settings">settings</span>
                Settings
            </span>
</div>
<!-- Floating Action / Context: Left Center -->
<div class="fixed left-lg top-1/2 -translate-y-1/2 flex flex-col gap-xl items-center">
<button class="group opacity-20 hover:opacity-100 transition-all duration-500">
<span class="material-symbols-outlined text-[20px]" data-icon="star">star</span>
</button>
<button class="group opacity-20 hover:opacity-100 transition-all duration-500">
<span class="material-symbols-outlined text-[20px]" data-icon="description">description</span>
</button>
</div>
<!-- Core Transcription Canvas -->
<div class="max-w-[800px] w-full text-center space-y-md">
<p class="font-display-lg text-display-lg text-focus-in text-on-surface opacity-30 select-none">
                The essence of design is not
            </p>
<p class="font-display-lg text-display-lg text-focus-in text-on-surface select-none">
                what we add, but what we
            </p>
<p class="font-display-lg text-display-lg text-focus-in text-on-surface select-none">
                dare to leave out...
            </p>
<div class="pt-xl flex justify-center gap-xs">
<span class="font-body-reading text-body-reading text-outline opacity-40 italic">Listening for voice patterns</span>
<span class="flex gap-1 items-end h-6 pb-2">
<span class="w-[2px] h-1 bg-black/20 animate-pulse"></span>
<span class="w-[2px] h-2 bg-black/20 animate-pulse delay-75"></span>
<span class="w-[2px] h-1 bg-black/20 animate-pulse delay-150"></span>
</span>
</div>
</div>
<!-- Elegant Bottom Controller (Derived from BottomNavBar JSON) -->
<div class="fixed bottom-xl left-1/2 -translate-x-1/2 flex flex-col items-center gap-lg">
<!-- Thin Waveform Animation -->
<div class="flex items-center justify-center gap-[4px] h-12 w-[320px] mb-md overflow-hidden" id="waveform-container">
<!-- Waveform bars generated by JS for organic feel -->
</div>
<!-- Controller Shell -->
<nav class="flex items-center gap-xl px-xl py-md bg-white border border-black/5 rounded-full shadow-[0_20px_50px_rgba(0,0,0,0.05)] transition-all hover:shadow-[0_20px_60px_rgba(0,0,0,0.08)]">
<!-- Record (Active Logic) -->
<button class="group flex flex-col items-center gap-1">
<div class="bg-secondary text-on-secondary rounded-full p-md transition-all group-active:scale-90 duration-200">
<span class="material-symbols-outlined block" data-icon="fiber_manual_record" style="font-variation-settings: 'FILL' 1;">fiber_manual_record</span>
</div>
<span class="font-label-caps text-[8px] uppercase tracking-tighter opacity-0 group-hover:opacity-40 transition-opacity">Record</span>
</button>
<!-- Pause -->
<button class="group flex flex-col items-center gap-1">
<div class="text-on-surface-variant p-md hover:bg-on-surface/5 rounded-full transition-all group-active:scale-90 duration-200">
<span class="material-symbols-outlined block" data-icon="pause">pause</span>
</div>
<span class="font-label-caps text-[8px] uppercase tracking-tighter opacity-0 group-hover:opacity-40 transition-opacity">Pause</span>
</button>
<!-- Stop -->
<button class="group flex flex-col items-center gap-1">
<div class="text-on-surface-variant p-md hover:bg-on-surface/5 rounded-full transition-all group-active:scale-90 duration-200">
<span class="material-symbols-outlined block" data-icon="stop">stop</span>
</div>
<span class="font-label-caps text-[8px] uppercase tracking-tighter opacity-0 group-hover:opacity-40 transition-opacity">Stop</span>
</button>
</nav>
</div>
<!-- Bottom Corners Status -->
<div class="fixed bottom-lg left-lg opacity-40">
<span class="font-label-caps text-label-caps uppercase tracking-widest">High Fidelity Mono • 48kHz</span>
</div>
<div class="fixed bottom-lg right-lg opacity-40">
<span class="font-label-caps text-label-caps uppercase tracking-widest">Cloud Encrypted</span>
</div>
</main>
<script>
        // Generate Minimal Waveform
        const waveformContainer = document.getElementById('waveform-container');
        const barCount = 40;
        const bars = [];

        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'waveform-bar w-[2px] bg-black/10 rounded-full';
            bar.style.height = '4px';
            waveformContainer.appendChild(bar);
            bars.push(bar);
        }

        function animateWaveform() {
            bars.forEach((bar, index) => {
                const randomHeight = Math.max(4, Math.sin(Date.now() / 200 + index) * 20 + 10 + Math.random() * 10);
                bar.style.height = `${randomHeight}px`;
                // Tonal shift based on height
                bar.style.opacity = (randomHeight / 40) + 0.1;
            });
            requestAnimationFrame(animateWaveform);
        }
        animateWaveform();

        // Simple Timer Logic
        let seconds = 252; // 04:12
        const timerElement = document.getElementById('timer');

        setInterval(() => {
            seconds++;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timerElement.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }, 1000);

        // Interaction Feedback
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                const feedback = document.createElement('div');
                feedback.className = 'fixed pointer-events-none w-4 h-4 bg-black/5 rounded-full -translate-x-1/2 -translate-y-1/2 animate-ping';
                // Note: Simplified placement for demo
            });
        });
    </script>
</body></html>
